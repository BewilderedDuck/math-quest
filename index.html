<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Euler Quest</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚡ Euler Quest</h1>
    <div class="stats">
      <span>⭐ XP: <span id="xp">0</span></span>
      <span>🔥 Streak: <span id="streak">0</span></span>
      <span>❤️ <span id="hearts">5</span></span>
      <button id="hintBtn">💡 Hint</button>
      <div id="hint"></div>
    </div>
  </div>

  <div class="card">
    <div class="progress"><div id="progressFill"></div></div>
    <div class="badge">Euler Chapter 1</div>
    <h2 id="question"></h2>
    <div id="answers"></div>
    <div id="feedback"></div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
